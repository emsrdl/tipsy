server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/manifest+json image/svg+xml;

    # === NO REDIRECTS! ===
    # All requests → index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache headers for index.html - NO CACHE
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # Cache headers for manifest - NO CACHE
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # Service worker - NO CACHE
    location ~ ^/sw\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # Static assets - LONG CACHE (vite adds hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
