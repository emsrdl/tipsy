name: Cleanup Preview Deployment

on:
  pull_request:
    types: [closed]

permissions: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Dokploy Preview Deployment
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          BRANCH: ${{ github.head_ref }}
        run: |
          DEPLOYMENTS=$(curl -sf -G "https://core.emsr.cc/api/previewDeployment.all" \
            --data-urlencode 'input={"applicationId":"jputpM5xsLcDcvrqXAn1Y"}' \
            -H "x-api-key: $DOKPLOY_API_KEY")

          PREVIEW_ID=$(echo "$DEPLOYMENTS" | jq -r ".[] | select(.branch == \"$BRANCH\") | .previewDeploymentId")

          if [ -z "$PREVIEW_ID" ]; then
            echo "No preview deployment found for branch $BRANCH"
            exit 0
          fi

          curl -sf -X POST "https://core.emsr.cc/api/previewDeployment.delete" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"previewDeploymentId\": \"$PREVIEW_ID\"}"

          echo "✅ Deleted preview deployment $PREVIEW_ID for branch $BRANCH"
