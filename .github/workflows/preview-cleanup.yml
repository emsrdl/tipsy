name: Cleanup Preview Deployment

on:
  pull_request:
    types: [closed, unlabeled]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        github.event.action == 'closed' ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'preview' && github.actor != 'github-actions[bot]')
      )
    steps:
      - name: Remove preview label
        if: github.event.action == 'closed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! OUTPUT=$(gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label "preview" 2>&1); then
            echo "$OUTPUT" | grep -qi "label does not exist" || { echo "$OUTPUT" >&2; exit 1; }
          fi

      - name: Delete Dokploy Preview Deployment
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          BRANCH: ${{ github.head_ref }}
          APP_ID: jputpM5xsLcDcvrqXAn1Y
        run: |
          CURL_AUTH=(-H "x-api-key: $DOKPLOY_API_KEY" -H "CF-Access-Client-Id: $CF_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_CLIENT_SECRET")

          DEPLOYMENTS_RESPONSE=$(curl -sS -w "HTTPSTATUS:%{http_code}" \
            "https://core.emsr.cc/api/previewDeployment.all?applicationId=$APP_ID" \
            "${CURL_AUTH[@]}")

          DEPLOYMENTS=$(echo "$DEPLOYMENTS_RESPONSE" | sed -e 's/HTTPSTATUS:[0-9]\{3\}$//')
          HTTP_STATUS=$(echo "$DEPLOYMENTS_RESPONSE" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error: Failed to fetch preview deployments (HTTP status $HTTP_STATUS)"
            exit 1
          fi

          PREVIEW_IDS=$(echo "$DEPLOYMENTS" | jq -r --arg branch "$BRANCH" '.[] | select(.branch == $branch) | .previewDeploymentId')

          if [ -z "$PREVIEW_IDS" ]; then
            echo "No preview deployment found for branch $BRANCH"
            exit 0
          fi

          FAILED=0
          while IFS= read -r PREVIEW_ID; do
            if curl -fsS -X POST "https://core.emsr.cc/api/previewDeployment.delete" \
              "${CURL_AUTH[@]}" \
              -H "Content-Type: application/json" \
              -d "{\"previewDeploymentId\": \"$PREVIEW_ID\"}"; then
              echo "✅ Deleted preview deployment $PREVIEW_ID for branch $BRANCH"
            else
              echo "❌ Failed to delete preview deployment $PREVIEW_ID for branch $BRANCH" >&2
              FAILED=1
            fi
          done <<< "$PREVIEW_IDS"

          [ "$FAILED" -eq 0 ] || exit 1
