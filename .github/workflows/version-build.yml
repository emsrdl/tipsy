name: Build (versioned)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version env
        shell: bash
        run: |
          VITE_APP_VERSION=$(git describe --tags --dirty --always 2>/dev/null || node -p "require('./package.json').version")
          echo "VITE_APP_VERSION=${VITE_APP_VERSION}" >> "$GITHUB_ENV"
          echo "VITE_COMMIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
